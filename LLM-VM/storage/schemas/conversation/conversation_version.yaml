name: "Conversation_Version"
description: "Version wrapper for conversation content"

versioning:
  root: "Root"
  version_node: "Conversation_Version"
  version_index_attr: "number"
  content_container: null

nodes:
  Root:
    type: root
    fields: []
    children: ["Conversation_Version"]

  Conversation_Version:
    type: version
    index_attr: "number"
    fields:
      - patch_info
      - conversation_history
    children: []
