name: "todolist_version"
description: "Version wrapper for todolist content"

versioning:
  root: "Root"
  version_node: "ToDoList_Version"
  version_index_attr: "number"
  content_container: null

nodes:
  Root:
    type: root
    fields: []
    children: ["ToDoList_Version"]

  ToDoList_Version:
    type: version
    index_attr: "number"
    fields:
      - patch_info
      - conversation_history
    children: [] # Dynamically filled with Category nodes
