name: "MealPlan_Version"
description: "Version wrapper for itinerary content"

versioning:
  root: "Root"
  version_node: "MealPlan_Version"
  version_index_attr: "number"
  content_container: null

nodes:
  Root:
    type: root
    fields: []
    children: ["MealPlan_Version"]

  MealPlan_Version:
    type: version
    index_attr: "number"
    fields:
      - patch_info
      - conversation_history
    children: []
