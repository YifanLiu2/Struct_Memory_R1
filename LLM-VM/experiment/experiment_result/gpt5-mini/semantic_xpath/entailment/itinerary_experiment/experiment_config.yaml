name: "itinerary_experiment"

# Queries to run
queries:
  - name: "read_queries"
    use_versions: "false" # Set to true if you want to use the versioned tree for read queries, which will reflect changes from create/update/delete queries. Set to false to use the original tree for all read queries, which will not reflect any changes from create/update/delete queries.
    queries:
      - "My friend lives in Mississauga, about an hour from downtown. What days are without any work commitments or flights?"
      - "The weather forecast shows heavy rain on Day 7. Which activities are outdoors?"
      - "My sister and nephew are joining me on Day 6. What activities would be fun for a kid?"
      - "I'm putting together my expense report. What are the most expensive restaurants I've booked?"
      - "I've been stuck in meetings most of the week. Which days have nature activities where I can actually get outside?"

    ground_truth:
      - [
          Root > Itinerary_Version 1 > Day 6,
          Root > Itinerary_Version 1 > Day 7,
          Root > Itinerary_Version 1 > Day 8,
          Root > Itinerary_Version 1 > Day 9,
        ]
      - [Root > Itinerary_Version 1 > Day 7 > Distillery District Walk]
      - [
          Root > Itinerary_Version 1 > Day 6 > Ripley's Aquarium,
          Root > Itinerary_Version 1 > Day 6 > Toronto Islands Ferry and Bike Ride,
        ]
      - [
          Root > Itinerary_Version 1 > Day 1 > Canoe Restaurant,
          Root > Itinerary_Version 1 > Day 2 > Alo Restaurant,
          Root > Itinerary_Version 1 > Day 5 > Kaiseki Kaji,
        ]
      - [
          Root > Itinerary_Version 1 > Day 1,
          Root > Itinerary_Version 1 > Day 6,
          Root > Itinerary_Version 1 > Day 8,
        ]

  - name: "create_queries"
    use_versions: "false" # Set to true to create new versions of the tree for each create query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    queries:
      - "For all days that don't have a dinner planned, add a cheap dinner option."
      - "I just noticed Day 2 has no breakfast, my first meeting is at 9am and I'll be starving. Add a quick hotel breakfast before the meeting."
      - "The workshop on Day 3 ends at 11am and then I have nothing until the AGO at noon. Add a coffee break in between. there's a good cafe near the gallery."
      - "I completely forgot about souvenirs. Add a stop at Roots or the Hudson's Bay flagship on Day 10 morning before the CN Tower. I need to grab gifts before I fly out."
      - "I'd like to end the first day with some live music. Add Pj O'Brien's to the end of Day 1."

    ground_truth:
      - [Root > Itinerary_Version 1 > Day 10/Restaurant]
      - [Root > Itinerary_Version 1 > Day 2/Restaurant]
      - [Root > Itinerary_Version 1 > Day 3/Restaurant]
      - [Root > Itinerary_Version 1 > Day 10/POI]
      - [Root > Itinerary_Version 1 > Day 1/POI]

  - name: "update_queries"
    use_versions: "false" # Set to true to create new versions of the tree for each update query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    queries:
      - "I just checked my spending and I'm way over budget. Replace all expensive dinners with a cheap eats placeholder and set cost to $10"
      - "I'd rather do the ROM than the AGO. Change the activity on Day 3 to the ROM."
      - "Some work events got cancelled. On Day 2, change any work related events to Personal Day."
      - "I had a long day so am going to sleep in tomorrow. Change my Leslieville brunch to a dedicated sleep in time block"
      - "My departure flight got pushed back to 10pm. Update my day 10 to reflect this."

    ground_truth:
      - [
          Root > Itinerary_Version 1 > Day 1 > Canoe Restaurant,
          Root > Itinerary_Version 1 > Day 2 > Alo Restaurant,
          Root > Itinerary_Version 1 > Day 5 > Kaiseki Kaji,
        ]
      - [Root > Itinerary_Version 1 > Day 3 > Art Gallery of Ontario]
      - [
          Root > Itinerary_Version 1 > Day 2 > Client Kickoff Meeting,
          Root > Itinerary_Version 1 > Day 2 > Strategy Workshop,
        ]
      - [Root > Itinerary_Version 1 > Day 9 > Lady Marmalade]
      - [Root > Itinerary_Version 1 > Day 10 > YYZ Departure]

  - name: "delete_queries"
    use_versions: "false" # Set to true to create new versions of the tree for each delete query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    queries:
      - "It's definitely going to rain all day on Day 7. Cancel any outdoor activities, I'll figure out replacements."
      - "I actually went to the CN Tower on my last trip to Toronto. Remove any CN Tower activities. I'd rather do something new."
      - "Bad news. my friend who was going to host me at Niagara just tested positive for COVID. I need to cancel the Niagara Falls trip."
      - "I'm exhausted. I'm going to take Day 5 as a personal day and skip all the work stuff. Cancel every work-related activity on that day."
      - "On the day we go to the ROM, cancel the breakfast. "
    ground_truth:
      - [Root > Itinerary_Version 1 > Day 7 > Distillery District Walk]
      - [
          Root > Itinerary_Version 1 > Day 10 > CN Tower EdgeWalk,
          Root > Itinerary_Version 1 > Day 10 > 360 Restaurant at CN Tower,
        ]
      - [
          Root > Itinerary_Version 1 > Day 8 > Niagara Falls Day Trip,
          Root > Itinerary_Version 1 > Day 8 > Elements on the Falls,
        ]
      - [
          Root > Itinerary_Version 1 > Day 5 > Client Check-in Call,
          Root > Itinerary_Version 1 > Day 5 > Email Catch-up Block,
          Root > Itinerary_Version 1 > Day 5 > Networking Drinks,
        ]
      - [Root > Itinerary_Version 1 > Day 7 > Fran's Restaurant]

  # # Version Queries
  # - "What was the original time block for the Client Kickoff Meeting on Day 2?"
  # - "Show me the cost of the Alo Restaurant tasting menu from the first version of the itinerary."
  # - "Did I have any outdoor activities scheduled for Day 7 in the initial version?"
  # - "What was the description of the Harbourfront Stroll on Day 1?"
  # - "List all the restaurants that were planned for Day 4 in the original itinerary."

# =============================================================================
# EXPERIMENT CONFIGURATION
# All parameters for this experiment are defined below
# =============================================================================

config:
  # Schema configuration
  # Choose which schema and data file to use
  active_schema: "itinerary" # Options: itinerary, todolist
  active_data: "travel_toronto_10day" # Options: todolist, travel_toronto_10day

  # LLM Client configuration
  # Model options: "gpt-4o", "gpt-5", "gpt-5-mini", "o1", "o3-mini", etc.
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-5-mini"
    max_tokens: 16384
    # For GPT-4 series: temperature controls creativity (0-1)
    temperature: 0
    # For GPT-5/o1/o3 series: reasoning_effort controls reasoning depth
    # Options: none (fastest), low, medium (default), high, xhigh (deepest)
    reasoning_effort: "low"

  # XPath executor settings
  xpath_executor:
    top_k: 5
    score_threshold: 0.05
    # Scoring method: "llm", "entailment", or "cosine"
    scoring_method: "entailment"

  # In-context pipeline settings (single LLM call with full tree)
  incontext_pipeline:
    temperature: 0
    max_tokens: 16384

  # Entailment scorer settings
  entailment:
    model: "facebook/bart-large-mnli"
    hypothesis_template: "This is related to {predicate}."
    # device: auto-detected if not set (cuda > mps > cpu)

  # Cosine similarity scorer settings
  cosine:
    model: "sentence-transformers/msmarco-distilbert-base-tas-b"
    predicate_template: "{predicate}"
    # device: auto-detected if not set (cuda > mps > cpu)

# =============================================================================
# EXAMPLE QUERIES (commented out for reference)
# =============================================================================

