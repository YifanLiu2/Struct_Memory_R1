name: "itinerary_version_queries"

# Queries to run - each entry is a session
# Named session:   {name: "session_name", queries: ["q1", "q2"]}
# Unnamed session:  ["q1", "q2"]  (auto-named Session_1, Session_2, ...)
# Multi-turn sessions share the same tree state across queries

# Queries to run
queries:
  - name: "mt1_version_queries"
    use_versions: "false"
    tree_path: "storage/memory/itinerary/multiturn/mt1.xml"
    queries:
      # - "It's definitely going to rain all day on Day 7. Cancel any outdoor activities, I'll figure out replacements."
      # - "My departure flight got pushed back to 10pm. Update my day 10 to reflect this."
      # - "For all days that don't have a dinner planned, add a cheap dinner option."
      # - "I'm exhausted. I'm going to take Day 5 as a personal day and skip all the work stuff. Cancel every work-related activity on that day."
      # - "I've been stuck in meetings most of the week. Which days have nature activities where I can actually get outside?"

      - "What was flight time before we updated it? Check the previous itinerary versions"
      - "What work events did we cancel? Check the previous itinerary versions"

    ground_truth:
      - any:
          - "Root > Itinerary_Version 2 > Day 10 > YYZ Departure"
      - [
          "Root > Itinerary_Version 4 > Day 5 > Client Check-in Call",
          "Root > Itinerary_Version 4 > Day 5 > Email Catch-up Block",
          "Root > Itinerary_Version 4 > Day 5 > Networking Drinks",
        ]

  - name: "mt2_version_queries"
    use_versions: "false"
    tree_path: "storage/memory/itinerary/multiturn/mt2.xml"
    queries:
      #Multi-turn 2: Update → Delete → Create → Read → Update
      # - "I just checked my spending and I'm way over budget. Replace all expensive dinners with a cheap eats placeholder and set cost to $10"
      # - "I actually went to the CN Tower on my last trip to Toronto. Remove any CN Tower activities. I'd rather do something new."
      # - "I just noticed Day 2 has no breakfast, my first meeting is at 9am and I'll be starving. Add a quick hotel breakfast before the meeting."
      # - "My sister and nephew are joining me on Day 6. What activities would be fun for a kid?"
      # - "I had a long day so am going to sleep in tomorrow. Change my Leslieville brunch to a dedicated sleep in time block"
      - "What was the most expensive restaurant before we cancelled them? Check the previous itinerary versions"
      - "Where was the breakfast we cancelled? Check the previous itinerary versions"

    ground_truth:
      - any:
          - "Root > Itinerary_Version 1 > Day 2 > Alo Restaurant"
      - ["Root > Itinerary_Version 4 > Day 9 > Lady Marmalade"]

  - name: "mt3_version_queries"
    use_versions: "false"
    tree_path: "storage/memory/itinerary/multiturn/mt3.xml"
    queries:
      # - "The workshop on Day 3 ends at 11am and then I have nothing until the AGO at noon. Add a coffee break in between. there's a good cafe near the gallery."
      # - "I'd rather do the ROM than the AGO. Change the activity on Day 3 to the ROM."
      # - "My friend lives in Mississauga, about an hour from downtown. What days are without any work commitments or flights?"
      # - "Bad news. my friend who was going to host me at Niagara just tested positive for COVID. I need to cancel the Niagara Falls trip."
      # - "I'd like to end the first day with some live music. Add Pj O'Brien's to the end of Day 1."
      - "What day was modified to add a coffee break? Check the previous itinerary versions"
      - "What was the original activity on Day 3? Check the previous itinerary versions"

    ground_truth:
      - ["Root > Itinerary_Version 1 > Day 3"]
      - ["Root > Itinerary_Version 2 > Day 3 > Art Gallery of Ontario"]

  - name: "mt4_version_queries"
    use_versions: "false"
    tree_path: "storage/memory/itinerary/multiturn/mt4.xml"
    queries:
      # - "On the day we go to the ROM, cancel the breakfast."
      # - "I completely forgot about souvenirs. Add a stop at Roots or the Hudson's Bay flagship on Day 10 morning before the CN Tower. I need to grab gifts before I fly out."
      # - "Some work events got cancelled. On Day 2, change any work related events to Personal Day."
      # - "It's definitely going to rain all day on Day 7. Cancel any outdoor activities, I'll figure out replacements."
      # - "I'm putting together my expense report. What are the most expensive restaurants I've booked?"
      - "What day did we modify to cancel the breakfast? Check the previous itinerary versions"
      - "Where was the client kickoff meeting before we cancelled it? Check the previous itinerary versions"

    ground_truth:
      - ["Root > Itinerary_Version 1 > Day 7"]
      - ["Root > Itinerary_Version 3 > Day 2 > Client Kickoff Meeting"]

  - name: "mt5_version_queries"
    use_versions: "false"
    tree_path: "storage/memory/itinerary/multiturn/mt5.xml"
    queries:
      # - "It's definitely going to rain all day on Day 7. Cancel any outdoor activities, I'll figure out replacements."
      # # - "Delete all very expensive restaurants from the itinerary."
      # - "My departure flight got pushed back to 10pm. Update my day 10 to reflect this."
      # - "For all days that don't have a dinner planned, add a cheap dinner option."
      - "What outdoor activities did we cancel earlier? Check the previous itinerary versions"
      - "What was the restaurant on day 5 before we changed it? Check the previous itinerary versions"

    ground_truth:
      - ["Root > Itinerary_Version 1 > Day 7 > Distillery District Walk"]
      - ["Root > Itinerary_Version 2 > Day 5 > Kaiseki Kaji"]

# =============================================================================
# EXPERIMENT CONFIGURATION
# All parameters for this experiment are defined below
# =============================================================================

config:
  # Schema configuration
  # Choose which schema and data file to use
  active_schema: "itinerary" # Options: itinerary, todolist, session_recommendation
  active_data: "travel_toronto_10day" # Options: todolist, travel_toronto_10day

  # LLM Client configuration
  # Model options: "gpt-4o", "gpt-5", "gpt-5-mini", "o1", "o3-mini", etc.
  openai:
    #api_key: "${OPENROUTER_API_KEY}" # or point this env var to your OpenRouter key
    api_key: "${OPENAI_API_KEY}"
    # base_url: "https://openrouter.ai/api/v1"
    model: "gpt-5-mini" # or whatever Qwen model ID OpenRouter uses

    max_tokens: 128000
    # For GPT-4 series: temperature controls creativity (0-1)
    temperature: 0

    # For GPT-5/o1/o3 series: reasoning_effort controls reasoning depth
    # Options: none (fastest), low, medium (default), high, xhigh (deepest)
    reasoning_effort: "low"

  # openai:
  #   api_key: "${OPENROUTER_API_KEY}"      # or point this env var to your OpenRouter key
  #   base_url: "https://openrouter.ai/api/v1"
  #   model: "google/gemini-3-flash-preview"     # or whatever Qwen model ID OpenRouter uses
  #   max_tokens: 128000
  #   temperature: 0


  # XPath executor settings
  xpath_executor:
    top_k: 5
    score_threshold: 0.05
    # Scoring method: "llm", "entailment", or "cosine"
    scoring_method: "entailment"

  # In-context pipeline settings (single LLM call with full tree)
  incontext_pipeline:
    temperature: 0
    max_tokens: 16384

  # Entailment scorer settings
  entailment:
    model: "facebook/bart-large-mnli"
    hypothesis_template: "This is related to {predicate}."
    # device: auto-detected if not set (cuda > mps > cpu)

  # Cosine similarity scorer settings
  cosine:
    model: "qwen/qwen3-embedding-8b"
    predicate_template: "{predicate}"
    openai:
      api_key: "${OPENROUTER_API_KEY}"
      base_url: "https://openrouter.ai/api/v1"
    # device: auto-detected if not set (cuda > mps > cpu)
