name: "nutrition_multiturn"

queries:
  - name: "nutrition_mt1"
    use_versions: "true"
    tree_path: "storage/memory/nutrition/nutrition_7day.xml"
    queries:
      # Multi-turn 1: Create → Create → Read → Update → Update → Delete → Delete
      - "For fathers greek food filled day, please add a classic american breakfast option."
      - "Add a zucchini noodle pesto bowl dinner option for mother on day 4"
      - "I can't decide between the three options for Father's lunch on Day 1. Which one has the highest protein?"
      - "Update fathers maple kissed taco option to Birria tacos"
      - "Update mothers teriyaki salmon bowl lunch to a tofu based dish"
      - "Remove all meals for child that contain peanuts, as they have an allergy"
      - "Child has some messy lunches that won't pack well for school - delete a few options that sounds hard to transport or eat cleanly."

  - name: "nutrition_mt2"
    use_versions: "true"
    tree_path: "storage/memory/nutrition/nutrition_7day.xml"
    queries:
      # Multi-turn 2: Delete → Create → Update → Create → Read → Update → Delete
