name: "todolist_experiment"

# Queries to run - each entry is a session
# Named session:   {name: "session_name", queries: ["q1", "q2"]}
# Unnamed session:  ["q1", "q2"]  (auto-named Session_1, Session_2, ...)
# Multi-turn sessions share the same tree state across queries

queries:
  # READ Queries
  - name: "read_queries"
    tree_path: "storage/memory/todo_list/todolist.xml"
    use_versions: "false" # Set to true if you want to use the versioned tree for read queries, which will reflect changes from create/update/delete queries. Set to false to use the original tree for all read queries, which will not reflect any changes from create/update/delete queries.

    queries:
      - "Which projects are currently stuck or blocked?"
      - "Show me all high priority tasks related to my research."
      - "Find the last task I added to the Garage Repair project."
      - "I need to see the first two tasks for the NSERC grant application."
      - "What tasks do I have that are related to travel"
      - "Show me all tasks about either 'running' or 'meditation'"
      - "Which projects have a High importance task that is complete"
      - "What are my learning goals for this semester?"
      - "Have I booked a hotel in Vancouver yet for the conference?"
      - "When do I need to book my flight to Vancouver by"

    ground_truth:
      - ["Root > ToDoList_Version 1 > Work > Thesis: Solve AI"]
      - [
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application > Task 1",
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application > Task 2",
          "Root > ToDoList_Version 1 > Work > Thesis: Solve AI > Task 3",
          "Root > ToDoList_Version 1 > Work > Thesis: Solve AI > Task 1",
        ]
      - ["Root > ToDoList_Version 1 > Household > Fix Garage Door > Task 3"]
      - [
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application > Task 1",
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application > Task 2",
        ]
      - [
          "Root > ToDoList_Version 1 > Personal > Conference Travel: Vancouver > Task 1",
          "Root > ToDoList_Version 1 > Personal > Conference Travel: Vancouver > Task 2",
          "Root > ToDoList_Version 1 > Personal > General > Task 2",
        ]
      - any:
          - "Root > ToDoList_Version 1 > Health > Marathon Training Block > Task 1"
          - "Root > ToDoList_Version 1 > Health > Marathon Training Block > Task 2"
          - "Root > ToDoList_Version 1 > Health > Mental Health > Task"
      - [
          "Root > ToDoList_Version 1 > Health > Marathon Training Block",
          "Root > ToDoList_Version 1 > Household > Fix Garage Door",
          "Root > ToDoList_Version 1 > Personal > Conference Travel: Vancouver",
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application",
        ]
      - [
          "Root > ToDoList_Version 1 > Learning > Skill Acquisition > Task 1",
          "Root > ToDoList_Version 1 > Learning > Skill Acquisition > Task 2",
        ]
      - [
          "Root > ToDoList_Version 1 > Personal > Conference Travel: Vancouver > Task 2",
        ]
      - [
          "Root > ToDoList_Version 1 > Personal > Conference Travel: Vancouver > Task 1",
        ]

  # Create Queries
  - name: "create_queries"
    tree_path: "storage/memory/todo_list/todolist.xml"
    use_versions: "false" # Set to true to create new versions of the tree for each create query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    queries:
      - "Add a new project called 'Garage Repair' under the 'Household' category."
      - "Add a task to the 'Garage Repair' project called 'Fix the leaky faucet'."
      - "Add a task to my groceries to buy eggs and orange juice, i need it for tomorrow morning"
      - "Add a task to read the paper DeepSeekMath to my work project. High priority."
      - "I want to get better at playing piano. Add a new learning project called 'Piano Practice' and add a task to practice scales for 30 minutes every day."

    ground_truth:
      - ["Root > ToDoList_Version 1 > Household/Project"]
      - ["Root > ToDoList_Version 1 > Household > Garage Repair/Task"]
      - ["Root > ToDoList_Version 1 > Household > Weekly Groceries/Task"]
      - ["Root > ToDoList_Version 1 > Work > Thesis: Solve AI/Task"]
      - ["Root > ToDoList_Version 1 > Learning > Piano Practice/Project"] # Might be wrong

  # Delete Queries (single-turn sessions)
  - name: "delete_queries"
    tree_path: "storage/memory/todo_list/todolist.xml"
    use_versions: "false" # Set to true to create new versions of the tree for each delete query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    queries:
      - "Remove all high priority work related tasks from my todo list"
      - "Delete the repair man task from the 'Garage Repair' project."
      - "Delete office hours from my todo list"
      - "Delete the task read attention is all you need from my learning project"
      - "Delete projects with a 2027 deadline from my todo list"

    ground_truth:
      - [
          "Root > ToDoList_Version 1 > Work > Thesis: Solve AI > Task 1",
          "Root > ToDoList_Version 1 > Work > Thesis: Solve AI > Task 3",
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application > Task 1",
          "Root > ToDoList_Version 1 > Work > NSERC CGS-M Grant Application > Task 2",
        ]
      - ["Root > ToDoList_Version 1 > Household > Fix Garage Door > Task 3"]
      - ["Root > ToDoList_Version 1 > Work > TA: Intro to ML (CS480) > Task 2"]
      - ["Root > ToDoList_Version 1 > Learning > Skill Acquisition > Task 2"]
      - ["Root > ToDoList_Version 1 > Work > Thesis: Solve AI"]

  # Update Queries
  - name: "update_queries"
    tree_path: "storage/memory/todo_list/todolist.xml"
    use_versions: "false" # Set to true to create new versions of the tree for each update query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.

    queries:
      - "Update the grade midterm exams status to done"
      - "Update buy milk to done"
      - "Update all tasks in fix garage door to done"
      - "Update the deadline to renew my passport the correct date of July 3, 2026"
      - "Im trying to eat better, change ramen on my grocery list to be a salad instead"

    ground_truth:
      - ["Root > ToDoList_Version 1 > Work > TA: Intro to ML (CS480) > Task 1"]
      - ["Root > ToDoList_Version 1 > Household > Weekly Groceries > Task 1"]
      - [
          "Root > ToDoList_Version 1 > Household > Fix Garage Door > Task 1",
          "Root > ToDoList_Version 1 > Household > Fix Garage Door > Task 2",
          "Root > ToDoList_Version 1 > Household > Fix Garage Door > Task 3",
        ]
      - ["Root > ToDoList_Version 1 > Personal > General > Task 2"]
      - ["Root > ToDoList_Version 1 > Household > Weekly Groceries > Task 3"]

# =============================================================================
# EXPERIMENT CONFIGURATION
# All parameters for this experiment are defined below
# =============================================================================

config:
  # Schema configuration
  # Choose which schema and data file to use
  active_schema: "todolist" # Options: itinerary, todolist, session_recommendation
  active_data: "todolist" # Options: todolist, travel_toronto_10day

  # LLM Client configuration
  # Model options: "gpt-4o", "gpt-5", "gpt-5-mini", "o1", "o3-mini", etc.
  # openai:
  #   api_key: "${OPENAI_API_KEY}"
  #   model: "gpt-5-mini"
  #   max_tokens: 128000
  #   # For GPT-4 series: temperature controls creativity (0-1)
  #   temperature: 0
  #   # For GPT-5/o1/o3 series: reasoning_effort controls reasoning depth
  #   # Options: none (fastest), low, medium (default), high, xhigh (deepest)
  #   reasoning_effort: "low"

  openai:
    api_key: "${OPENROUTER_API_KEY}" # or point this env var to your OpenRouter key
    # api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    model: "qwen/qwen3-next-80b-a3b-instruct" # or whatever Qwen model ID OpenRouter uses
    max_tokens: 128000
    temperature: 0
    reasoning_effort: "low"

  # XPath executor settings
  xpath_executor:
    top_k: 5
    score_threshold: 0.05
    # Scoring method: "llm", "entailment", or "cosine"
    scoring_method: "entailment"

  # In-context pipeline settings (single LLM call with full tree)
  incontext_pipeline:
    temperature: 0
    max_tokens: 128000

  # Entailment scorer settings
  entailment:
    model: "facebook/bart-large-mnli"
    hypothesis_template: "This is related to {predicate}."
    # device: auto-detected if not set (cuda > mps > cpu)

  # Cosine similarity scorer settings
  cosine:
    model: "qwen/qwen3-embedding-8b"
    predicate_template: "{predicate}"
    openai:
      api_key: "${OPENROUTER_API_KEY}"
      base_url: "https://openrouter.ai/api/v1"
    # device: auto-detected if not set (cuda > mps > cpu)

