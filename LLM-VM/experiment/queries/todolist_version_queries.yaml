name: "todolist_version_experiment"

queries:
  - name: "version_query1"
    use_versions: "false" # Set to true to create new versions of the tree for each update query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    tree_path: "storage/memory/todo_list/multiturn/mt1.xml"
    queries:
      # - "Delete the task read attention is all you need from my learning project"
      # - "Update the deadline in general project to renew my passport the correct date of July 3, 2026"
      # - "Im trying to eat better, change ramen on my grocery list to be a salad instead"

      - "What was the original deadline for renewing my passport? Check the previous versions"
      - "What was the original grocery list before I we changed something to salad? Check the previous versions"

    ground_truth:
      - ["Root > ToDoList_Version 2 > Personal > General > Task 2"]
      - [
          "Root > ToDoList_Version 3 > Household > Weekly Groceries > Task 1",
          "Root > ToDoList_Version 3 > Household > Weekly Groceries > Task 2",
          "Root > ToDoList_Version 3 > Household > Weekly Groceries > Task 3",
        ]

  - name: "version_query2"
    use_versions: "false" # Set to true to create new versions of the tree for each update query, which will reflect changes in subsequent read queries. Set to false to make changes directly to the original tree, which will reflect changes in subsequent read queries but without versioning.
    tree_path: "storage/memory/todo_list/multiturn/mt2.xml"
    queries:
      # - "Update Finalize CCV task to done"
      # - "Update the task 'draft research proposal' to done"
      # - "Delete Run benchmarks on cluster from my thesis project"
      # - "Delete the repair man task from the 'Garage Repair' project."

      - "What was the blocker for the task we deleted from my thesis project? Check the previous versions"
      - "What was the due date of the repair man task before we deleted it? Check the previous versions"

    ground_truth:
      - ["Root > ToDoList_Version 3 > Work > Thesis: Solve AI > Task 1"]
      - ["Root > ToDoList_Version 4 > Household > Fix Garage Door > Task 3"]

  - name: "version_query3"
    use_versions: "false"
    tree_path: "storage/memory/todo_list/multiturn/mt3.xml"
    queries:
      # - "Delete Run benchmarks on cluster from my thesis project"
      # - "Update the priority of the long run in Marathon Training to Low."
      # - "Delete the 'Request reference letters' task from the work NSERC project."

      - "What was the priority of the long run before I changed it to Low? Check previous versions."
      - "What was the due date of the reference letters task that I just deleted? Check previous versions."

    ground_truth:
      - [
          "Root > ToDoList_Version 2 > Health > Marathon Training Block > Task 1",
        ]
      - [
          "Root > ToDoList_Version 3 > Work > NSERC CGS-M Grant Application > Task 2",
        ]

  - name: "version_query4"
    use_versions: "false"
    tree_path: "storage/memory/todo_list/multiturn/mt4.xml"
    queries:
      # - "Create a new task 'Buy a standing desk' under the Household General project."
      # - "Delete the project 'Mental Health' from the Health category."
      # - "Update the due date for 'Learn Rust programming basics' to 2026-06-01."
      # - "Add a task 'Refactor data loader' to my Thesis project with High priority."

      - "What tasks were in the Mental Health project before it was deleted? Check previous versions."
      - "What was the previous due date for the Rust programming task? Check previous versions."

    ground_truth:
      - ["Root > ToDoList_Version 2 > Health > Mental Health > Task"]
      - ["Root > ToDoList_Version 3 > Learning > Skill Acquisition > Task 1"]

  - name: "version_query5"
    use_versions: "false"
    tree_path: "storage/memory/todo_list/multiturn/mt5.xml"
    queries:
      # - "Delete the project 'Conference Travel: Vancouver' from the Personal category."
      # - "Delete all tasks in the Household category that are marked as 'Low' priority."

      - "What was the progress status of the Vancouver travel project before I deleted it? Check previous versions."
      - "Which grocery task in the Household category was deleted? Check previous versions."
    ground_truth:
      - ["Root > ToDoList_Version 1 > Personal > Conference Travel: Vancouver"]
      - ["Root > ToDoList_Version 2 > Household > Weekly Groceries > Task 3"]

# =============================================================================
# EXPERIMENT CONFIGURATION
# All parameters for this experiment are defined below
# =============================================================================

config:
  # Schema configuration
  # Choose which schema and data file to use
  active_schema: "todolist" # Options: itinerary, todolist, session_recommendation
  active_data: "todolist" # Options: todolist, travel_toronto_10day

  # LLM Client configuration
  # Model options: "gpt-4o", "gpt-5", "gpt-5-mini", "o1", "o3-mini", etc.
  # openai:
  #   #api_key: "${OPENROUTER_API_KEY}" # or point this env var to your OpenRouter key
  #   api_key: "${OPENAI_API_KEY}"
  #   # base_url: "https://openrouter.ai/api/v1"
  #   model: "gpt-5-mini" # or whatever Qwen model ID OpenRouter uses

  #   max_tokens: 128000
  #   # For GPT-4 series: temperature controls creativity (0-1)
  #   temperature: 0

  #   # For GPT-5/o1/o3 series: reasoning_effort controls reasoning depth
  #   # Options: none (fastest), low, medium (default), high, xhigh (deepest)
  #   reasoning_effort: "low"

  # openai:
  #   api_key: "${OPENROUTER_API_KEY}"      # or point this env var to your OpenRouter key
  #   base_url: "https://openrouter.ai/api/v1"
  #   model: "google/gemini-3-flash-preview"     # or whatever Qwen model ID OpenRouter uses
  #   max_tokens: 128000
  #   temperature: 0

  openai:
    api_key: "${OPENROUTER_API_KEY}" # or point this env var to your OpenRouter key
    # api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    model: "qwen/qwen3-next-80b-a3b-thinking" # or whatever Qwen model ID OpenRouter uses
    max_tokens: 128000
    temperature: 0
    reasoning_effort: "low"

  # XPath executor settings
  xpath_executor:
    top_k: 5
    score_threshold: 0.05
    # Scoring method: "llm", "entailment", or "cosine"
    scoring_method: "entailment"

  # In-context pipeline settings (single LLM call with full tree)
  incontext_pipeline:
    temperature: 0
    max_tokens: 16384

  # Entailment scorer settings
  entailment:
    model: "facebook/bart-large-mnli"
    hypothesis_template: "This is related to {predicate}."
    # device: auto-detected if not set (cuda > mps > cpu)

  # Cosine similarity scorer settings
  cosine:
    model: "qwen/qwen3-embedding-8b"
    predicate_template: "{predicate}"
    openai:
      api_key: "${OPENROUTER_API_KEY}"
      base_url: "https://openrouter.ai/api/v1"
    # device: auto-detected if not set (cuda > mps > cpu)

